version: '2.4'

volumes:
  homeassistant: {}

services:
  homeassistant:
    image: homeassistant/home-assistant:2026.3.3
    volumes:
      - homeassistant:/config
    network_mode: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

  nginx:
    build: nginx
    network_mode: host
    restart: unless-stopped
