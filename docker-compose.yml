version: '2.4'

volumes:
  homeassistant: {}

services:
  homeassistant:
    image: homeassistant/home-assistant:2026.6.3
    volumes:
      - homeassistant:/config
    network_mode: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

  nginx:
    build: nginx
    network_mode: host
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - 1883:1883
